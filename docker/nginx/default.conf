server {
    listen 80;
    server_name _;

    # Docroot. If you move your entrypoint into a public/ folder,
    # change this to /var/www/html/public and set the fastcgi path below.
    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # "app" is the compose service name; php-fpm listens on 9000.
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
